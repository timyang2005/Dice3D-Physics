name: Android CI Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      run: |
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"
        sdkmanager "platform-tools"

    - name: Download Gradle
      run: |
        curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
        unzip -qo /tmp/gradle.zip -d /tmp/gradle
        echo "Gradle version:"
        /tmp/gradle/gradle-8.5/bin/gradle --version

    - name: Download JBullet dependencies
      run: |
        mkdir -p app/libs
        curl -sL "https://github.com/bersaty/SimulateDice/raw/master/app/libs/jbullet.jar" -o app/libs/jbullet.jar
        curl -sL "https://github.com/bersaty/SimulateDice/raw/master/app/libs/vecmath.jar" -o app/libs/vecmath.jar
        ls -la app/libs/
        file app/libs/jbullet.jar
        file app/libs/vecmath.jar

    - name: Accept Android Licenses
      run: yes | sdkmanager --licenses || true

    - name: Generate Gradle Wrapper
      run: |
        cd $GITHUB_WORKSPACE
        /tmp/gradle/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ls -la gradle/wrapper/
        echo "Verifying wrapper:"
        ./gradlew --version

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --stacktrace 2>&1 | tee build-output.log
        echo "=== Build exit code: $? ==="

    - name: List all build outputs
      if: always()
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found anywhere"
        echo "=== Listing app/build/outputs ==="
        ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs directory"
        echo "=== Listing app/build ==="
        ls -la app/build/ 2>/dev/null || echo "No build directory"

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build-output.log

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: app/build/outputs/apk/**/*.apk
        if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: apk
        path: ./apk

    - name: List APK files
      run: find ./apk -name "*.apk" -type f

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: Release v1.0.0
        body: |
          3D 物理骰子模拟器 - 首个发布版本

          功能特性:
          - 基于 JBullet 物理引擎的真实骰子模拟
          - 支持 D4/D6/D8/D10/D12/D20/D100 七种骰子
          - OpenGL ES 3.0 3D 渲染，含光照与阴影
          - 重力感应与甩动手势投掷
          - 自由视角控制（旋转/缩放/平移）
          - 深色模式支持
          - 投掷历史记录与统计
          - 音效与触觉反馈
        files: ./apk/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
