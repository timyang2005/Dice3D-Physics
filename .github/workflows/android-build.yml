name: Android CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Download Gradle Wrapper JAR
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          curl -sL "https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip && \
          unzip -p /tmp/gradle.zip gradle-8.5/lib/gradle-wrapper-*.jar > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          true
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            GRADLE_DIST_URL="https://services.gradle.org/distributions/gradle-8.5-bin.zip"
            curl -sL "$GRADLE_DIST_URL" -o /tmp/gradle.zip
            unzip -qo /tmp/gradle.zip -d /tmp/gradle
            /tmp/gradle/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          fi
        fi
        chmod +x gradlew
        ls -la gradle/wrapper/

    - name: Download JBullet dependencies
      run: |
        mkdir -p app/libs
        curl -sL "https://github.com/bersaty/SimulateDice/raw/master/app/libs/jbullet.jar" -o app/libs/jbullet.jar
        curl -sL "https://github.com/bersaty/SimulateDice/raw/master/app/libs/vecmath.jar" -o app/libs/vecmath.jar
        ls -la app/libs/

    - name: Accept Android Licenses
      run: yes | sdkmanager --licenses || true

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace 2>&1 | tee -a build.log

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk

    - name: Upload Build Log on Failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-log
        path: build.log

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: release-apk
        path: ./apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0
        name: Release v1.0.0
        body: |
          3D 物理骰子模拟器 - 首个发布版本

          功能特性:
          - 基于 JBullet 物理引擎的真实骰子模拟
          - 支持 D4/D6/D8/D10/D12/D20/D100 七种骰子
          - OpenGL ES 3.0 3D 渲染，含光照与阴影
          - 重力感应与甩动手势投掷
          - 自由视角控制（旋转/缩放/平移）
          - 深色模式支持
          - 投掷历史记录与统计
          - 音效与触觉反馈
        files: ./apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
