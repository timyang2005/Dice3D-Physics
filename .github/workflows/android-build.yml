name: Android CI Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      run: |
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"
        sdkmanager "platform-tools"

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ANDROID_HOME=$ANDROID_HOME"

    - name: Download Gradle
      run: |
        curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
        unzip -qo /tmp/gradle.zip -d /tmp/gradle

    - name: Download JBullet dependencies
      run: |
        mkdir -p app/libs
        curl -sL "https://github.com/bersaty/SimulateDice/raw/master/app/libs/jbullet.jar" -o app/libs/jbullet.jar
        curl -sL "https://github.com/bersaty/SimulateDice/raw/master/app/libs/vecmath.jar" -o app/libs/vecmath.jar
        file app/libs/jbullet.jar
        file app/libs/vecmath.jar

    - name: Accept Android Licenses
      run: yes | sdkmanager --licenses || true

    - name: Generate Gradle Wrapper
      run: |
        /tmp/gradle/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew --version

    - name: Build Debug APK
      shell: bash
      run: |
        set -o pipefail
        ./gradlew assembleDebug --stacktrace 2>&1 | tee build-output.log

    - name: Report build errors as annotations
      if: failure()
      run: |
        if [ -f build-output.log ]; then
          echo "=== EXTRACTING ERRORS FROM BUILD LOG ==="
          grep -A 5 -i "^e:" build-output.log 2>/dev/null || true
          echo "=== FAILURE SECTION ==="
          grep -A 20 "^FAILURE" build-output.log 2>/dev/null || true
          echo "=== WHAT WENT WRONG ==="
          grep -A 20 "What went wrong" build-output.log 2>/dev/null || true
          echo "=== KOTLIN ERRORS ==="
          grep -i "e: file://" build-output.log 2>/dev/null || true
          echo "=== ERROR LINES ==="
          grep -i "error" build-output.log 2>/dev/null | head -30 || true
        fi

    - name: Output full build log to summary
      if: always()
      run: |
        if [ -f build-output.log ]; then
          echo "## Build Output Log" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat build-output.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: app/build/outputs/apk/**/*.apk
        if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: apk
        path: ./apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: Release v1.0.0
        body: |
          3D 物理骰子模拟器 - 首个发布版本
        files: ./apk/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
