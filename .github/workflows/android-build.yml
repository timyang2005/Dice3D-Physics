name: Android CI Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      run: |
        sdkmanager "platforms;android-35"
        sdkmanager "build-tools;34.0.0"
        sdkmanager "platform-tools"

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Download Gradle
      run: |
        curl -sL https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o /tmp/gradle.zip
        unzip -qo /tmp/gradle.zip -d /tmp/gradle

    - name: Download JBullet dependencies
      run: |
        mkdir -p app/libs
        curl -sL "https://github.com/bersaty/SimulateDice/raw/master/app/libs/jbullet.jar" -o app/libs/jbullet.jar
        curl -sL "https://github.com/bersaty/SimulateDice/raw/master/app/libs/vecmath.jar" -o app/libs/vecmath.jar

    - name: Accept Android Licenses
      run: yes | sdkmanager --licenses || true

    - name: Generate Gradle Wrapper
      run: |
        /tmp/gradle/gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1
        chmod +x gradlew

    - name: Build Debug APK
      shell: bash
      run: |
        set -o pipefail
        ./gradlew assembleDebug --stacktrace 2>&1 | tee build-output.log

    - name: Report build errors
      if: failure()
      run: |
        if [ -f build-output.log ]; then
          echo "=== KOTLIN ERRORS ==="
          grep "^e:" build-output.log 2>/dev/null | head -20 | while IFS= read -r line; do
            echo "::error::$line"
          done
          echo "=== FAILURE SECTION ==="
          grep -A 30 "^FAILURE" build-output.log 2>/dev/null | head -40 | while IFS= read -r line; do
            echo "::error::$line"
          done
          echo "=== WHAT WENT WRONG ==="
          grep -A 30 "What went wrong" build-output.log 2>/dev/null | head -40 | while IFS= read -r line; do
            echo "::error::$line"
          done
          echo "=== ALL ERROR LINES ==="
          grep -i "error" build-output.log 2>/dev/null | head -20 | while IFS= read -r line; do
            echo "::error::$line"
          done
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: app/build/outputs/apk/**/*.apk
        if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: apk
        path: ./apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.1.0
        name: Release v1.1.0
        body: |
          3D 物理骰子模拟器 - 莫兰迪色系版本
        files: ./apk/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
